apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-app
  namespace: logging-system
  labels:
    app: custom-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: custom-app
  template:
    metadata:
      labels:
        app: custom-app
    spec:
      containers:
        - name: custom-app
          image: custom-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_PATH
              value: /app/config/config.json
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
            - name: app-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: app-logs
          emptyDir: {}
        - name: app-config
          configMap:
            name: custom-app-config
