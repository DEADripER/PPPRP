grafana:
  enabled: false

alertmanager:
  enabled: false

prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false

prometheus:
  prometheusSpec:
    scrapeInterval: 15s
    serviceMonitorSelector:
      matchLabels:
        prometheus: ppprp
    serviceMonitorNamespaceSelector: {}
    podMonitorSelector:
      matchLabels:
        prometheus: ppprp
    podMonitorNamespaceSelector: {}
