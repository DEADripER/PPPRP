apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: custom-app
  namespace: logging-system
spec:
  serviceName: custom-app-stateful
  replicas: 3
  selector:
    matchLabels:
      app: custom-app
  template:
    metadata:
      labels:
        app: custom-app
        monitoring: enabled
    spec:
      containers:
        - name: custom-app
          image: custom-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_PATH
              value: /app/config/config.json
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: logs-volume
              mountPath: /app/logs
            - name: config-volume
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: custom-app-config
  volumeClaimTemplates:
    - metadata:
        name: logs-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
