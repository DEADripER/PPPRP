apiVersion: v1
kind: Pod
metadata:
  name: server
  namespace: logging-system
  labels:
    app: server
spec:
  containers:
    - name: custom-app
      image: custom-app:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      env:
        - name: CONFIG_PATH
          value: /app/config/config.json
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: config-volume
          mountPath: /app/config
          readOnly: true
  volumes:
    - name: logs-volume
      emptyDir: {}
    - name: config-volume
      configMap:
        name: custom-app-config
